name: Ghost Bot Deployment

on:
  push:
    branches: [ main ] # মেইন ব্রাঞ্চে কোড পুশ করলে অটো রান হবে
  workflow_dispatch: # এটি থাকলে তুমি গিটহাবের 'Actions' ট্যাব থেকে ম্যানুয়ালি রান দিতে পারবে

jobs:
  run-ghost-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # লেটেস্ট স্টেবল ভার্সন ব্যবহার করা হয়েছে

      - name: Install Dependencies
        run: |
          cd ghost-bot
          npm install

      - name: Run Ghost Bot
        run: |
          cd ghost-bot
          node index.js
        env:
          # এখানে তোমার বটের প্রয়োজনীয় সিক্রেটগুলো অ্যাড করবে
          # যেমন: APP_STATE: ${{ secrets.APP_STATE }}
          # এগুলো তোমার GitHub Repository Settings > Secrets থেকে সেট করতে হবে
          
